server:
  port: ${PORT:8083}

spring:
  application:
    name: sales-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sales_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

app:
  jwt:
    secret: ${APP_JWT_SECRET:01234567890123456789012345678901papeleria}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
