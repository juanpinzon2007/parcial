server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

app:
  jwt:
    secret: ${APP_JWT_SECRET:01234567890123456789012345678901papeleria}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
  admin:
    email: ${ADMIN_EMAIL:admin@papeleria.com}
    password: ${ADMIN_PASSWORD:Admin123*}
    full-name: ${ADMIN_FULL_NAME:Administrador General}
