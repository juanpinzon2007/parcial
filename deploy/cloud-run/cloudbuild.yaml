options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-central1
  _REPOSITORY: papeleria
  _TAG: latest

steps:
  - name: maven:3.9.9-eclipse-temurin-17
    entrypoint: mvn
    args:
      - -f
      - auth-service/pom.xml
      - clean
      - package
      - -DskipTests

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - auth-service/Dockerfile.runtime
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/auth-service:${_TAG}
      - .

  - name: maven:3.9.9-eclipse-temurin-17
    entrypoint: mvn
    args:
      - -f
      - inventory-service/pom.xml
      - clean
      - package
      - -DskipTests

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - inventory-service/Dockerfile.runtime
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/inventory-service:${_TAG}
      - .

  - name: maven:3.9.9-eclipse-temurin-17
    entrypoint: mvn
    args:
      - -f
      - sales-service/pom.xml
      - clean
      - package
      - -DskipTests

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - sales-service/Dockerfile.runtime
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/sales-service:${_TAG}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - frontend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend:${_TAG}
      - frontend

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/auth-service:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/inventory-service:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/sales-service:${_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/frontend:${_TAG}
